# ─── Cortana tmux config ─────────────────────────────────────
# Prefix: Ctrl+A (easier to hit than Ctrl+B)
# ─────────────────────────────────────────────────────────────

# Change prefix from Ctrl+B to Ctrl+A
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ─── Session switching (the main thing you need) ────────────
# Ctrl+A then S  = session picker (interactive list)
# Ctrl+A then N  = next session
# Ctrl+A then P  = previous session
bind s choose-tree -s -Z
bind n switch-client -n
bind p switch-client -p

# ─── Window/pane basics ────────────────────────────────────
# Ctrl+A then C  = new window
# Ctrl+A then |  = split vertical
# Ctrl+A then -  = split horizontal
# Ctrl+A then X  = kill pane (with confirm)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Move between panes with Alt+arrow (no prefix needed)
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# ─── Status bar — always know where you are ─────────────────
set -g status-position top
set -g status-style "bg=#1a1a2e,fg=#e0e0e0"
set -g status-left-length 30
set -g status-right-length 60
set -g status-left "#[fg=#00d4ff,bold] #S #[default]│ "
set -g status-right "#[fg=#888888]#h │ %H:%M"
set -g window-status-current-format "#[fg=#00d4ff,bold]#I:#W*"
set -g window-status-format "#[fg=#666666]#I:#W"

# ─── Quality of life ────────────────────────────────────────
set -g mouse on                    # Mouse works (scroll, click panes, resize)
set -g history-limit 50000         # Big scrollback
set -g base-index 1                # Windows start at 1, not 0
setw -g pane-base-index 1
set -g renumber-windows on         # No gaps in window numbers
set -g escape-time 0               # No delay after Escape
set -g focus-events on             # Terminal focus events
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"  # True color

# ─── Reload config ──────────────────────────────────────────
# Ctrl+A then R = reload this config
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# ─── Detach ─────────────────────────────────────────────────
# Ctrl+A then D = detach (standard)
# Ctrl+A then Q = detach ALL clients (useful when MacBook + Studio both attached)
bind q detach-client -a
